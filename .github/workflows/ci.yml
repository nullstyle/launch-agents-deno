name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task fmt:check
      - run: deno task lint
      - run: deno task check
      - run: deno task test
      - run: deno task test:doc
